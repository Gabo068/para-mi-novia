<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Flor Amarilla Mágica</title>
<style>
   html,body{ margin:0; height:100%; background:#0a1100; overflow:hidden; }
  canvas{ display:block; }

  /* 🎵 Reproductor - estilo base */
  .player{
    position:fixed; 
    left:50%; bottom:20px; 
    transform:translateX(-50%);
    width:92%; max-width:680px;
    display:flex; align-items:center; gap:12px;
    padding:12px; 
    border:2px solid #ffcc00; 
    border-radius:999px;
    background:rgba(20,30,0,.65);
    box-shadow:0 0 16px #ffcc00, 0 0 36px #ffaa00;
    z-index:50; color:#fff;
    font:14px/1 Arial, sans-serif;
  }

  .player button{
    background:transparent;
    border:none;
    color:#fff;
    font-size:22px;
    cursor:pointer;
  }

  .progress{ 
    flex:1;
    height:10px;
    border-radius:999px;
    background:rgba(255,255,255,.25); 
    overflow:hidden;
    cursor:pointer;
  }

  .progress-bar{ 
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ffcc00,#ff6600);
    box-shadow:0 0 10px #ffcc00;
  }

  #time{ 
    min-width:76px;
    text-align:right;
    font-size:14px;
  }

  /* 📱 En móviles */
  @media (max-width:600px){
    .player{
      height:3%; 
      position:fixed;
      bottom:1.7%; left:50%; transform:translateX(-50%);
      width:90%;
      max-width:90%;
      padding:14px 16px;
      border-radius:20px;
      background:rgba(10,20,0,.85);
      box-shadow:0 -2px 20px #ffcc00;
      font:16px/1.4 Arial, sans-serif;

      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .player button{ 
      font-size:32px; 
      flex-shrink:0;
    }

    .progress{ 
      flex:1;
      height:10px;
      border-radius:999px;
      background:rgba(255,255,255,.25); 
      overflow:hidden;
    }

    .progress-bar{ 
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#ffcc00,#ff6600);
      box-shadow:0 0 14px #ffcc00;
    }

    #time{ 
      font-size:16px;
      min-width:85px;
      text-align:right;
    }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="player">
  <button id="play">▶️</button>
  <div class="progress" id="progress">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div id="time">0:00 / 0:00</div>
</div>

<audio id="audio" loop>
  <source src="https://www.dropbox.com/scl/fi/qfv28rqu6b36jwusao4x4/Love.MP3?rlkey=ptjd053374f028aa4jfcfrfxn&st=1j0j51eo&raw=1" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js"></script>

<script>
/* =================== PARÁMETROS =================== */
const WORDS   = [
  "Mi vida",
  "Mi cielo",
  "Mi amor",
  "Mi Princesa",
  "Mi reina",
  "Mi niña",
  "Mi bebé",
  "Mi angelito",
  "Mi Conejita tierna",
  "Mi Ling ling",
  "Mi pollita de color azul",
  "Mi lucerito",
  "Mi estrellita",
  "Mi sol",
  "Mi lunita",
  "Mi tesoro",
  "Mi corazón",
  "Mi dulzura",
  "Mi chiquita",
  "Mi cosita hermosa",
  "Mi flor",
  "Mi muñecota",
  "Mi bomboncito",
  "Mi cariño",
  "Mi pedacito de cielo",
  "Mi todo",
  "Mi preciosa",
  "Mi hermosa",
  "Mi muñequita",
  "Mi chaparrita",
  "Mi ternurita",
  "Mi dulzura bonita",
  "Mi alegría",
  "Mi razón de ser",
  "Mi amorsito",
  "Mi cielito lindo",
  "Mi cosita linda",
  "Mi bebita hermosa",
  "Mi diosa",
  "Mi encanto",
  "Mi angelito bonita",
  "Mi florecita tierna",
  "Mi sueño",
  "Mi ilusión",
  "Mi todo bonito",
  "Mi amorcito linda",
  "Mi cosita rica",
  "Mi reina hermosa",
  "Mi niña bonita",
  "Mi mundo 🤍"
];
const CENTRAL = "Dani";
// Tonos cálidos y primaverales
const COLORS  = ['#ffcc00','#ffaa00','#ffff66','#ff9900','#ccff66','#ffdb4d','#ffffff'];

/* =================== ESCENA BASE =================== */
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
renderer.setSize(innerWidth, innerHeight);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 5000);

let isMobile = /Mobi|Android/i.test(navigator.userAgent);
let targetDist = isMobile ? 550 : 380;
let currentDist = targetDist;
let rotX = 0.2, rotY = 0;

addEventListener('resize', ()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());

let lastTouchDist = 0;
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length===2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(lastTouchDist){
      const delta = lastTouchDist - dist;
      targetDist += delta * 0.5;
      targetDist = Math.max(180, Math.min(2000, targetDist));
    }
    lastTouchDist = dist;
  }
}, {passive:true});
canvas.addEventListener('touchend', ()=>{ lastTouchDist=0; });

/* =================== FONDO: LUZ SOLAR + POLEN =================== */
function makeRadialTexture(size=1024, inner='255,200,50', outer='50,20,0'){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const g=c.getContext('2d');
  const gr=g.createRadialGradient(size/2,size/2,size*0.1,size/2,size/2,size*0.5);
  gr.addColorStop(0,   'rgba('+inner+',0.35)');
  gr.addColorStop(0.6, 'rgba('+inner+',0.18)');
  gr.addColorStop(1,   'rgba('+outer+',0.00)');
  g.fillStyle=gr; g.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}
const sunGlare = new THREE.Sprite(new THREE.SpriteMaterial({
  map: makeRadialTexture(1024,'255,200,50','0,0,0'),
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
}));
sunGlare.scale.set(3000,3000,1);
sunGlare.position.set(0,0,-1000);
scene.add(sunGlare);

// Polen flotante / Luciérnagas de fondo
(function makePollen(count=1500, spread=2500){
  const g = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r  = spread*Math.random();
    const th = Math.random()*Math.PI*2;
    const ph = Math.acos(2*Math.random()-1);
    pos[i*3  ] = r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1] = r*Math.cos(ph);
    pos[i*3+2] = r*Math.sin(ph)*Math.sin(th);
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const pollen = new THREE.Points(g, new THREE.PointsMaterial({
    size:2.5, color:0xffeeaa, depthWrite:false, transparent:true, opacity:0.8
  }));
  scene.add(pollen);
})();

// Polvo mágico más cercano
(function makeMagicDust(count=300, radius=340){
  const g=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    const r=radius*(0.6+Math.random()*0.5);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1]=r*Math.cos(ph);
    pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const dust = new THREE.Points(g,new THREE.PointsMaterial({
    size:3.5, color:0xffcc00, depthWrite:false, transparent:true, opacity:0.9, blending:THREE.AdditiveBlending
  }));
  dust.userData={wiggle:0};
  scene.add(dust);
  scene.userData.dust = dust;
})();

/* =================== FLOR CENTRAL + FLORES ORBITANDO =================== */
const flowerBase = new THREE.Group();

// Centro de la flor
const centerGeom = new THREE.SphereGeometry(6, 32, 16);
const centerMat = new THREE.MeshPhongMaterial({
  color: 0x331a00, specular: 0x000000, emissive: 0x1a0d00
});
const centerMesh = new THREE.Mesh(centerGeom, centerMat);
centerMesh.scale.z = 0.5;
flowerBase.add(centerMesh);

// Pétalos amarillos
const petalGeom = new THREE.SphereGeometry(3, 16, 16);
const petalMat = new THREE.MeshPhongMaterial({
  color: 0xffcc00, specular: 0xffffff, shininess: 80,
  emissive: 0x664400, emissiveIntensity: 0.3
});
const numPetals = 14;
for(let i=0; i<numPetals; i++){
  const petal = new THREE.Mesh(petalGeom, petalMat);
  petal.scale.set(1, 3.8, 0.2); // Alargados y aplanados
  const angle = (i / numPetals) * Math.PI * 2;
  petal.position.x = Math.cos(angle) * 8.5;
  petal.position.y = Math.sin(angle) * 8.5;
  petal.rotation.z = angle;
  flowerBase.add(petal);
}

// Crear las flores pequeñas flotando alrededor
const floatingFlowers = [];
for(let i=0; i<45; i++){
  const f = flowerBase.clone();
  const s = 0.2 + Math.random()*0.35; // Escala de flores pequeñas
  f.scale.set(s, s, s);
  
  const phi = Math.acos(2*Math.random()-1);
  const theta = Math.random()*Math.PI*2;
  const r = 90 + Math.random()*160;
  
  f.position.set(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
  f.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
  
  f.userData = { 
    phi, theta, radius: r, 
    speed: 0.001 + Math.random()*0.002, 
    rotX: (Math.random()-0.5)*0.03, 
    rotY: (Math.random()-0.5)*0.03 
  };
  
  scene.add(f);
  floatingFlowers.push(f);
}

// Configurar la Flor Central Grande
const mainFlowerGroup = new THREE.Group();
const bigFlower = flowerBase.clone();
mainFlowerGroup.add(bigFlower);
scene.add(mainFlowerGroup);
const BASE_SCALE = 3.5;
mainFlowerGroup.scale.set(BASE_SCALE, BASE_SCALE, BASE_SCALE);

// Anillos/Aura de luz
function makeRingTexture(size=1024){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const g=c.getContext('2d');
  const grd=g.createRadialGradient(size/2,size/2,size*0.25,size/2,size/2,size*0.49);
  grd.addColorStop(0.0,'rgba(255,230,150,0.8)');
  grd.addColorStop(0.6,'rgba(255,180,50,0.25)');
  grd.addColorStop(1.0,'rgba(0,0,0,0)');
  g.fillStyle=grd;
  g.beginPath(); g.arc(size/2,size/2,size*0.49,0,Math.PI*2);
  g.arc(size/2,size/2,size*0.30,0,Math.PI*2,true); g.closePath(); g.fill();
  return new THREE.CanvasTexture(c);
}
const ringsGroup = new THREE.Group();
const ringA=new THREE.Sprite(new THREE.SpriteMaterial({
  map:makeRingTexture(), transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
}));
ringA.scale.set(520,520,1);
const ringB=ringA.clone(); ringB.scale.set(640,640,1); ringB.material.opacity=0.6;
ringsGroup.add(ringA, ringB);
ringsGroup.renderOrder = 0;
scene.add(ringsGroup);

// Texto central (negro + borde blanco + glow dorado)
function makeCenterTexture(msg){
  const c = document.createElement('canvas');
  c.width = 4096;
  c.height = 2048;
  const ctx = c.getContext('2d');
  let size = 600;
  ctx.font = 'bold '+size+'px Arial';
  while(ctx.measureText(msg).width > c.width*0.86 && size>80){
    size -= 20;
    ctx.font = 'bold '+size+'px Arial';
  }
  ctx.clearRect(0,0,c.width,c.height);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Texto negro + borde blanco + glow dorado
  ctx.fillStyle = '#000000';
  ctx.lineWidth = 16;
  ctx.strokeStyle = '#ffffff';
  ctx.strokeText(msg, c.width/2, c.height/2);
  ctx.shadowColor = '#ffcc00';
  ctx.shadowBlur = 90;
  ctx.fillText(msg, c.width/2, c.height/2);

  return new THREE.CanvasTexture(c);
}

if (CENTRAL && CENTRAL.trim()){
  const texFront = makeCenterTexture(CENTRAL.trim());
  const texBack  = makeCenterTexture(CENTRAL.trim());
  const planeMatFront = new THREE.MeshBasicMaterial({
    map: texFront, transparent: true, side: THREE.FrontSide, depthTest: true, depthWrite: false
  });
  const planeMatBack = new THREE.MeshBasicMaterial({
    map: texBack, transparent: true, side: THREE.FrontSide, depthTest: true, depthWrite: false
  });
  
  const maxWidth = BASE_SCALE * 14;
  const wordLength = CENTRAL.trim().length;
  let planeWidth = Math.min(maxWidth, Math.max(maxWidth*0.45, wordLength * 38));
  let planeHeight = planeWidth * 0.40;
  const planeGeom = new THREE.PlaneGeometry(planeWidth, planeHeight);

  const centerPlaneFront = new THREE.Mesh(planeGeom, planeMatFront);
  centerPlaneFront.position.set(0,0, 6); // Justo delante de la flor

  const centerPlaneBack = new THREE.Mesh(planeGeom, planeMatBack);
  centerPlaneBack.position.set(0,0, -6); // Detrás de la flor
  centerPlaneBack.rotation.y = Math.PI;

  mainFlowerGroup.add(centerPlaneFront);
  mainFlowerGroup.add(centerPlaneBack);
}

/* =================== PALABRAS ORBITANDO =================== */
const textGroup = new THREE.Group(); scene.add(textGroup);
function makeWordTexture(text, color){
  const c=document.createElement('canvas'), ctx=c.getContext('2d');
  let size=74; ctx.font='bold '+size+'px Arial';
  let textWidth=ctx.measureText(text).width;
  c.width  = Math.ceil(textWidth + 140);
  c.height = 170;
  ctx.font='bold '+size+'px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff';
  ctx.shadowColor=color; ctx.shadowBlur=34;
  ctx.fillText(text, c.width/2, c.height/2);
  return new THREE.CanvasTexture(c);
}
for (let i=0;i<WORDS.length;i++){
  const tex = makeWordTexture(WORDS[i], COLORS[i%COLORS.length]);
  const mat = new THREE.SpriteMaterial({
    map:tex, transparent:true, depthWrite:true, depthTest:true, blending:THREE.AdditiveBlending
  });
  const sp  = new THREE.Sprite(mat);
  sp.scale.set(92, 36, 1);
  const phi=Math.acos(2*Math.random()-1);
  const theta=Math.random()*Math.PI*2;
  const r = 120 + Math.random()*65;
  sp.position.set(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
  sp.userData = {phi, theta, radius:r, speed: 0.001+Math.random()*0.0015};
  sp.renderOrder = 2;
  textGroup.add(sp);
}

/* =================== LUCES CÁLIDAS =================== */
scene.add(new THREE.AmbientLight(0x403010)); // Luz de ambiente dorada
const key = new THREE.PointLight(0xffffee, 1.8, 0, 2); key.position.set(180, 220, 260); scene.add(key);
const rim1 = new THREE.PointLight(0xffcc00, 1.0, 0, 2); rim1.position.set(-200, -120, -240); scene.add(rim1);
const rim2 = new THREE.PointLight(0xffaa00, 0.9, 0, 2); rim2.position.set(200, -180, 200);  scene.add(rim2);
const rim3 = new THREE.PointLight(0xccff66, 0.7, 0, 2); rim3.position.set(-220, 200, -120); scene.add(rim3);

// Órbita de luces (luciérnagas grandes)
function makeDotTexture(size=256, rgb='255,200,100'){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const g=c.getContext('2d');
  const grd=g.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  grd.addColorStop(0,'rgba('+rgb+',1)');
  grd.addColorStop(0.4,'rgba('+rgb+',0.6)');
  grd.addColorStop(1,'rgba('+rgb+',0)');
  g.fillStyle=grd; g.beginPath(); g.arc(size/2,size/2,size/2,0,Math.PI*2); g.fill();
  return new THREE.CanvasTexture(c);
}
const orbitGroup = new THREE.Group(); scene.add(orbitGroup);
const orbiters = [
  { color:0xffcc00, rgb:'255,204,0', radius:220, speed: 0.008, height: 30, scale:46 },
  { color:0xccff66, rgb:'204,255,102', radius:260, speed:-0.006, height:-20, scale:42 },
  { color:0xffaa00, rgb:'255,170,0', radius:300, speed: 0.005, height: 10, scale:40 },
];
orbiters.forEach(o=>{
  const light = new THREE.PointLight(o.color, 1.1, 0, 2);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: makeDotTexture(256, o.rgb), transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
  }));
  sprite.scale.set(o.scale,o.scale,1);
  orbitGroup.add(light);
  orbitGroup.add(sprite);
  o.light = light; o.sprite = sprite; o.angle = Math.random()*Math.PI*2;
});

/* =================== CONTROLES CÁMARA =================== */
let dragging=false, lastX=0, lastY=0;
function onDown(e){dragging=true; const t=e.touches?e.touches[0]:e; lastX=t.clientX; lastY=t.clientY;}
function onMove(e){
  if(!dragging) return;
  const t=e.touches?e.touches[0]:e;
  const dx=(t.clientX-lastX)/innerWidth;
  const dy=(t.clientY-lastY)/innerHeight;
  rotY -= dx*3;
  rotX = Math.max(-1.2, Math.min(1.2, rotX - dy*2.2));
  lastX=t.clientX; lastY=t.clientY;
}
function onUp(){dragging=false;}
addEventListener('mousedown',onDown); addEventListener('mousemove',onMove); addEventListener('mouseup',onUp);
addEventListener('touchstart',onDown,{passive:true}); addEventListener('touchmove',onMove,{passive:true}); addEventListener('touchend',onUp,{passive:true});
addEventListener('wheel',(e)=>{ 
  targetDist+=e.deltaY*0.35; 
  targetDist = Math.max(180, Math.min(2000, targetDist)); 

},{passive:true});

/* =================== PÉTALOS CAYENDO (Antes cometas) =================== */
const fallingPetals=[];
function spawnPetal(){
  const geo=new THREE.PlaneGeometry(12, 8);
  const mat=new THREE.MeshBasicMaterial({color:0xffcc00, transparent:true, opacity:0.8, side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(geo,mat);
  const x = (Math.random()*2-1)*600;
  const z = (Math.random()*2-1)*600;
  mesh.position.set(x, 400, z);
  mesh.rotation.set(Math.random(), Math.random(), Math.random());
  scene.add(mesh);
  fallingPetals.push({
    m:mesh, 
    vy: -1.5 - Math.random()*2, 
    rx: Math.random()*0.05, 
    ry: Math.random()*0.05,
    life: 500
  });
}
setInterval(()=>{ if(Math.random()<0.6) spawnPetal(); }, 400);

/* =================== ANIMACIÓN =================== */
let t=0;
function tick(){
  requestAnimationFrame(tick);
  t+=0.01;

  // Brillo del sol de fondo
  sunGlare.material.opacity = 0.4 + 0.05*Math.sin(t*0.7);

  // Polvo cercano flotando
  if(scene.userData.dust){
    scene.userData.dust.userData.wiggle += 0.01;
    scene.userData.dust.rotation.y += 0.0006;
  }

  // Respiración de la flor principal + anillos
  const pulse = 1.0 + 0.03*Math.sin(t*3);
  mainFlowerGroup.scale.set(BASE_SCALE*pulse, BASE_SCALE*pulse, BASE_SCALE*pulse);
  mainFlowerGroup.rotation.y += 0.002;
  ringA.scale.set(520*(0.98+0.04*Math.sin(t*2.2)), 520*(0.98+0.04*Math.sin(t*2.2)), 1);
  ringB.scale.set(640*(0.98+0.05*Math.cos(t*2.0)), 640*(0.98+0.05*Math.cos(t*2.0)), 1);

  // Flores pequeñas orbitando
  floatingFlowers.forEach(f => {
    f.userData.theta += f.userData.speed;
    f.position.x = f.userData.radius * Math.sin(f.userData.phi) * Math.cos(f.userData.theta);
    f.position.z = f.userData.radius * Math.sin(f.userData.phi) * Math.sin(f.userData.theta);
    f.rotation.x += f.userData.rotX;
    f.rotation.y += f.userData.rotY;
  });

  // Luces orbitando (luciérnagas)
  orbiters.forEach(o=>{
    o.angle += o.speed;
    const x = o.radius*Math.cos(o.angle);
    const z = o.radius*Math.sin(o.angle);
    o.light.position.set(x, o.height, z);
    o.sprite.position.set(x, o.height, z);
  });

  // Palabras orbitando
  textGroup.children.forEach(sp=>{
    sp.material.opacity = 0.85 + 0.15*Math.sin(t*2 + sp.userData.radius);
    sp.userData.theta += sp.userData.speed;
    sp.position.x = sp.userData.radius*Math.sin(sp.userData.phi)*Math.cos(sp.userData.theta);
    sp.position.z = sp.userData.radius*Math.sin(sp.userData.phi)*Math.sin(sp.userData.theta);
  });

  // Pétalos cayendo
  for(let i=fallingPetals.length-1;i>=0;i--){
    const p=fallingPetals[i];
    p.m.position.y += p.vy;
    p.m.position.x += Math.sin(t*2 + p.m.position.y*0.01)*1.5; // Vuelo errático
    p.m.rotation.x += p.rx;
    p.m.rotation.y += p.ry;
    p.life--;
    if(p.life<=0 || p.m.position.y < -400){
      scene.remove(p.m); fallingPetals.splice(i,1);
    }
  }

  // Cámara
  currentDist += (targetDist-currentDist)*0.06;
  const cx=Math.cos(rotX), sx=Math.sin(rotX), cy=Math.cos(rotY), sy=Math.sin(rotY);
  camera.position.set(currentDist*sy*cx, currentDist*sx, currentDist*cy*cx);
  camera.lookAt(0,0,0);

  renderer.render(scene,camera);
}
tick();

/* =================== REPRODUCTOR =================== */
const audio=document.getElementById('audio');
const playBtn=document.getElementById('play');
const progress=document.getElementById('progress');
const bar=document.getElementById('progress-bar');
const time=document.getElementById('time');
let isPlaying=false;
function fmt(s){ if(!isFinite(s)) return '0:00'; const m=Math.floor(s/60); const ss=Math.floor(s%60).toString().padStart(2,'0'); return m+':'+ss; }
playBtn.addEventListener('click', async()=>{
  if(isPlaying){ audio.pause(); playBtn.textContent='▶️'; }
  else{ try{ await audio.play(); playBtn.textContent='⏸️'; }catch{} }
  isPlaying = !isPlaying;
});
audio.addEventListener('timeupdate', ()=>{
  const p=(audio.currentTime/audio.duration)*100;
  bar.style.width=(isFinite(p)?p:0)+'%';
  time.textContent = fmt(audio.currentTime)+' / '+fmt(audio.duration);
});
progress.addEventListener('click', (e)=>{
  const r=progress.getBoundingClientRect();
  const p=(e.clientX-r.left)/r.width;
  if(isFinite(audio.duration)) audio.currentTime = p*audio.duration;
});

document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
document.addEventListener('wheel', e => {
  if (e.ctrlKey) e.preventDefault();
}, { passive: false });
</script>
</body>
</html>
